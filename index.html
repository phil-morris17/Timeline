<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whittington History Hub</title>
<style>
:root{
  --bg:#f6f1e8;
  --paper:#fbf8f2;
  --ink:#2f2419;
  --muted:#6d6256;
  --line:#c8b9a4;
  --bar:#b9d56a;
  --bar-selected:#93b64b;
  --bar-related:#d8e7a6;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:Georgia, serif;
}
header{
  text-align:center;
  padding:20px;
  background:#e8dfd1;
  border-bottom:1px solid var(--line);
}
header h1{margin:0}
header p{margin:.5rem 0 0}
main{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}
.box{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
}
svg{
  width:100%;
  height:auto;
  display:block;
}
.tick{
  font-size:11px;
  fill:#777;
}
.item-rect{
  fill:var(--bar);
  stroke:none;
  cursor:pointer;
}
.item-rect.selected{
  fill:var(--bar-selected);
  stroke:#2f2419;
  stroke-width:2;
}
.item-rect.related{
  fill:var(--bar-related);
  stroke:#7a6a4f;
  stroke-width:1.5;
}
.item-label{
  font-size:12px;
  pointer-events:none;
}
.item-years{
  font-size:10px;
  fill:#555;
  pointer-events:none;
}
#meta{
  margin:10px 0;
  color:var(--muted);
}
#bio{
  line-height:1.5;
}
#overlaps{
  margin-top:18px;
}
@media (max-width:900px){
  main{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <h1>Whittington History Hub</h1>
  <p>Simple interactive overlap timeline</p>
</header>

<main>
  <section class="box">
    <h2>Timeline</h2>
    <svg id="chart" viewBox="0 0 1200 620" aria-label="Timeline chart"></svg>
  </section>

  <aside class="box">
    <h2 id="title">Click a person</h2>
    <div id="meta"></div>
    <div id="bio">Select a bar to show notes.</div>
    <div id="overlaps"></div>
  </aside>
</main>

<script>
const data = [
  {
    id: "1",
    title: "Richard Dixon",
    start: 1702,
    end: 1727,
    notes: "Early Dixon figure linked to the family’s growing local presence in Whittington."
  },
  {
    id: "2",
    title: "Richard Dixon Jnr",
    start: 1727,
    end: 1736,
    notes: "Continued the Dixon family presence in the parish during the early eighteenth century."
  },
  {
    id: "3",
    title: "William Dixon",
    start: 1736,
    end: 1743,
    notes: "Part of the continuing Dixon succession in Whittington."
  },
  {
    id: "4",
    title: "Richard Dixon Jnr 2",
    start: 1743,
    end: 1769,
    notes: "Represents the later eighteenth-century phase of Dixon family influence."
  },
  {
    id: "5",
    title: "Gilbert Dixon",
    start: 1769,
    end: 1777,
    notes: "A late Dixon family figure bridging older local influence and changing economic conditions."
  },
  {
    id: "6",
    title: "John Dixon",
    start: 1777,
    end: 1816,
    notes: "A key late figure in the Dixon line whose years overlap major parish transition."
  },
  {
    id: "7",
    title: "Dr Samuel Pegge",
    start: 1751,
    end: 1796,
    notes: "Rector of Whittington and noted antiquarian whose work preserved important local historical detail."
  }
];

const svg = document.getElementById("chart");
const titleEl = document.getElementById("title");
const metaEl = document.getElementById("meta");
const bioEl = document.getElementById("bio");
const overlapsEl = document.getElementById("overlaps");

const yearMin = 1680;
const yearMax = 1850;
const left = 120;
const right = 40;
const top = 50;
const rowGap = 65;
const barHeight = 24;
const innerWidth = 1200 - left - right;

function yearToX(year){
  return left + ((year - yearMin) / (yearMax - yearMin)) * innerWidth;
}

function overlaps(a, b){
  return !(a.end < b.start || a.start > b.end);
}

function createSvgEl(name){
  return document.createElementNS("http://www.w3.org/2000/svg", name);
}

function drawTicks(){
  for(let year = 1700; year <= 1850; year += 25){
    const x = yearToX(year);

    const line = createSvgEl("line");
    line.setAttribute("x1", x);
    line.setAttribute("x2", x);
    line.setAttribute("y1", 30);
    line.setAttribute("y2", 580);
    line.setAttribute("stroke", "#ddd");
    svg.appendChild(line);

    const text = createSvgEl("text");
    text.setAttribute("x", x);
    text.setAttribute("y", 20);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("class", "tick");
    text.textContent = year;
    svg.appendChild(text);
  }
}

const rectMap = new Map();

function drawBars(){
  let yPos = top;

  data.forEach(person => {
    const x = yearToX(person.start);
    const w = Math.max(20, yearToX(person.end) - x);

    const rect = createSvgEl("rect");
    rect.setAttribute("x", x);
    rect.setAttribute("y", yPos);
    rect.setAttribute("width", w);
    rect.setAttribute("height", barHeight);
    rect.setAttribute("class", "item-rect");
    svg.appendChild(rect);

    const label = createSvgEl("text");
    label.setAttribute("x", x + 6);
    label.setAttribute("y", yPos + 16);
    label.setAttribute("class", "item-label");
    label.textContent = person.title;
    svg.appendChild(label);

    const years = createSvgEl("text");
    years.setAttribute("x", x + 6);
    years.setAttribute("y", yPos + 30);
    years.setAttribute("class", "item-years");
    years.textContent = person.start + "–" + person.end;
    svg.appendChild(years);

    rect.addEventListener("click", () => selectPerson(person));
    rectMap.set(person.id, rect);

    yPos += rowGap;
  });
}

function selectPerson(person){
  rectMap.forEach(rect => rect.classList.remove("selected", "related"));

  const selectedRect = rectMap.get(person.id);
  if(selectedRect){
    selectedRect.classList.add("selected");
  }

  const contemporaries = data.filter(other =>
    other.id !== person.id && overlaps(person, other)
  );

  contemporaries.forEach(other => {
    const rect = rectMap.get(other.id);
    if(rect){
      rect.classList.add("related");
    }
  });

  titleEl.textContent = person.title;
  metaEl.textContent = person.start + "–" + person.end;
  bioEl.textContent = person.notes || "No notes available.";

  if(contemporaries.length){
    overlapsEl.innerHTML =
      "<strong>Contemporaries (" + contemporaries.length + ")</strong><br><br>" +
      contemporaries
        .map(c => c.title + " (" + c.start + "–" + c.end + ")")
        .join("<br>");
  } else {
    overlapsEl.innerHTML = "<strong>Contemporaries (0)</strong>";
  }
}

drawTicks();
drawBars();
</script>

</body>
</html>
